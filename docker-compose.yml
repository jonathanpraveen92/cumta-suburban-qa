version: '3.8'

services:
  # 1. PostgreSQL Database Service
  db:
    image: postgres:15-alpine
    container_name: cumta_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cumta_qa
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  # 2. Express Backend API Service
  backend:
    build: ./backend
    container_name: cumta_backend
    environment:
      PORT: 5000
      NODE_ENV: production
      DATABASE_URL: postgres://postgres:postgres@db:5432/cumta_qa
      JWT_SECRET: cumta_super_secret_key_2026_suburban_qa
      JWT_EXPIRES_IN: 7d
      UPLOAD_PATH: uploads/
    ports:
      - "5000:5000"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      - db
    restart: always

  # 3. Nginx-served React Frontend Service
  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=http://localhost:5000
    container_name: cumta_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

volumes:
  postgres_data:
  uploads_data:
